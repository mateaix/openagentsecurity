id: oas.secrets
title: Secret handling change review
sources:
  - owasp.secure-coding
  - mitre.cwe
risk: high
triggers:
  paths:
    - "**/.env*"
    - "**/*secret*"
    - "**/*token*"
    - "**/*credential*"
  keywords:
    - api_key
    - password
    - private_key
    - secret
    - token
requiredEvidence:
  - no-secrets-committed
  - secret-source-is-managed
gate:
  failOnMissingEvidence: true

