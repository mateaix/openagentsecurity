id: oas.agentic-tooling
title: Agentic tool and autonomy change review
sources:
  - owasp.agentic-top-10
  - owasp.mcp-top-10
  - nist.ai-rmf
  - cisa.agentic-ai
risk: high
triggers:
  paths:
    - "**/agents/**"
    - "**/.agents/**"
    - "**/agent*.yml"
    - "**/agent*.yaml"
    - "**/agent*.json"
    - "**/mcp*.json"
    - "**/.mcp/**"
  keywords:
    - tool_permission
    - approval
    - autonomy
    - shell
    - network
    - filesystem
    - browser
requiredEvidence:
  - tool-permissions-reviewed
  - human-approval-boundary-verified
  - agent-action-logging-verified
gate:
  failOnMissingEvidence: true
