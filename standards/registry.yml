version: 0.1.0
description: Public security source registry for OpenAgentSecurity rules.
sources:
  - id: owasp.asvs
    name: OWASP Application Security Verification Standard
    url: https://owasp.org/www-project-application-security-verification-standard/
    version: "5.0.0"
    license: project-specific
    areas:
      - application-security
      - verification
      - access-control
      - authentication
  - id: owasp.secure-coding
    name: OWASP Secure Coding Practices
    url: https://owasp.org/www-project-secure-coding-practices-quick-reference-guide/
    license: project-specific
    areas:
      - secure-coding
      - code-review
  - id: owasp.llm-top-10
    name: OWASP Top 10 for LLM Applications
    url: https://genai.owasp.org/llm-top-10/
    license: project-specific
    areas:
      - llm-security
      - agent-security
  - id: owasp.agentic-top-10
    name: OWASP Top 10 for Agentic Applications
    url: https://genai.owasp.org/resource/agentic-ai-threats-and-mitigations/
    license: project-specific
    areas:
      - agentic-ai
      - autonomy-risk
      - tool-use
      - human-oversight
  - id: owasp.mcp-top-10
    name: OWASP MCP Security Guidance
    url: https://genai.owasp.org/
    license: project-specific
    areas:
      - mcp-security
      - tool-permissions
      - prompt-injection
      - data-exposure
  - id: mitre.cwe
    name: MITRE Common Weakness Enumeration
    url: https://cwe.mitre.org/
    license: public
    areas:
      - weakness-taxonomy
  - id: nist.ssdf
    name: NIST Secure Software Development Framework
    url: https://csrc.nist.gov/publications/detail/sp/800-218/final
    version: "1.1"
    license: public-domain
    areas:
      - secure-sdlc
      - verification
      - release-gate
  - id: nist.ai-rmf
    name: NIST AI Risk Management Framework
    url: https://www.nist.gov/itl/ai-risk-management-framework
    license: public
    areas:
      - ai-risk-management
      - governance
      - monitoring
      - accountability
  - id: cisa.agentic-ai
    name: CISA, NSA, and international guidance for deploying AI systems securely
    url: https://www.cisa.gov/resources-tools/resources/careful-adoption-agentic-ai-services
    license: public
    areas:
      - agentic-ai-adoption
      - secure-configuration
      - human-oversight
      - monitoring
  - id: cisa.kev
    name: CISA Known Exploited Vulnerabilities Catalog
    url: https://www.cisa.gov/known-exploited-vulnerabilities-catalog
    license: public
    areas:
      - vulnerability-prioritization
      - exploited-vulnerabilities
  - id: openssf.scorecard
    name: OpenSSF Scorecard
    url: https://scorecard.dev/
    license: open-source
    areas:
      - supply-chain
      - repository-security
  - id: slsa
    name: Supply-chain Levels for Software Artifacts
    url: https://slsa.dev/
    license: open-source
    areas:
      - build-integrity
      - supply-chain
