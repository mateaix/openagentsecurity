version: 0.1.0
evidence:
  non-admin-access-denied:
    type: automated-or-manual
    status: missing
    description: Verify non-admin users cannot access admin-only actions.
  cross-tenant-access-denied:
    type: automated-or-manual
    status: missing
    description: Verify users cannot access data from another tenant.
  session-cookie-flags-verified:
    type: automated-or-manual
    status: missing
    description: Verify session cookies keep HttpOnly, Secure, and SameSite protections.
  tool-permissions-reviewed:
    type: manual-review
    status: missing
    description: Verify agent, MCP, shell, filesystem, browser, and network tools are least-privilege.
  dangerous-tool-access-justified:
    type: manual-review
    status: missing
    description: Justify any tool that can execute commands, read sensitive files, browse, or call external services.
  human-approval-boundary-verified:
    type: automated-or-manual
    status: missing
    description: Verify high-impact agent actions require explicit human approval before execution or merge.
  agent-action-logging-verified:
    type: automated-or-manual
    status: missing
    description: Verify agent tool calls, approvals, and security-relevant actions are logged for review.
