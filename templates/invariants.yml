version: 0.1.0
invariants:
  - id: admin-api-requires-admin-role
    description: Admin APIs require an admin role.
    paths:
      - "src/**/admin/**"
    requiredEvidence:
      - non-admin-access-denied
  - id: tenant-isolation
    description: Users cannot access another tenant's data.
    paths:
      - "src/**/tenant/**"
      - "src/**/permissions/**"
    requiredEvidence:
      - cross-tenant-access-denied
  - id: agent-dangerous-tools-require-approval
    description: Agent tool access that can change code, run commands, access files, use browsers, or call external services requires explicit review.
    paths:
      - "**/agents/**"
      - "**/.agents/**"
      - "**/mcp*.json"
      - "**/.mcp/**"
    requiredEvidence:
      - tool-permissions-reviewed
      - human-approval-boundary-verified
      - agent-action-logging-verified
